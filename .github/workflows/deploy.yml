name: Deploy to Hostinger VPS

# Auto-deploys on push to main. SSHes into the VPS, makes sure a clean clone of
# the repo exists, writes .env from GitHub secrets, and (re)starts the
# containers. The weekly bot run is scheduled by cron INSIDE the container —
# this workflow does NOT run the bot, it only ships code + config.
#
# Required secrets:
#   Connection:  VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PATH
#   App config:  SITE_HOSTNAME, TZ, GMAIL_FROM, GMAIL_TO, GMAIL_APP_PASSWORD,
#                NOTION_API_KEY, NOTION_DATABASE_ID
#   Sources:     SEC_USER_AGENT (optional; EDGAR works without it),
#                FMP_API_KEY (optional), FINNHUB_API_KEY (optional)
#
# The app-config secrets are written to .env on the VPS on every deploy, so the
# server never needs manual configuration — change a secret, push, done.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SITE_HOSTNAME: ${{ secrets.SITE_HOSTNAME }}
          TZ: ${{ secrets.TZ }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          # Your repo secret is named GMAIL_APP_SECRET; map it to the var the bot reads.
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_SECRET }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Secondary data sources (tier-2 enrichment). EDGAR needs no key, only
          # a declared contact (fair-access); if the secret is unset it falls back
          # to a repo-identifying UA in code, so EDGAR works out of the box.
          # FMP/Finnhub stay inactive in code until their key is non-empty.
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # The website refresh runs the screener, which can take several
          # minutes; raise the per-command timeout above the 10m default.
          command_timeout: 40m
          # Forward the app-config env vars into the remote shell so the heredoc
          # below can write them into .env.
          envs: SITE_HOSTNAME,TZ,GMAIL_FROM,GMAIL_TO,GMAIL_APP_PASSWORD,NOTION_API_KEY,NOTION_DATABASE_ID,SEC_USER_AGENT,FMP_API_KEY,FINNHUB_API_KEY
          script: |
            set -euo pipefail

            REPO="https://github.com/jason52388/Stock-Market-Analysis-w-Warren-Buffet-Bot.git"
            DIR="${{ secrets.VPS_PATH }}"

            # Ensure a clean clone exists at DIR. If it's missing or isn't a git
            # repo (e.g. a half-finished manual clone), recreate it. .env is
            # rewritten below regardless, so wiping the dir loses nothing.
            if [ ! -d "$DIR/.git" ]; then
              rm -rf "$DIR"
              git clone "$REPO" "$DIR"
            fi

            cd "$DIR"
            # Force the public HTTPS remote so no credentials are ever needed.
            git remote set-url origin "$REPO"
            git fetch origin main
            git reset --hard origin/main

            # Write .env from the secrets forwarded above. umask 077 -> chmod 600.
            umask 077
            cat > .env <<EOF
            TZ=${TZ:-America/New_York}
            SITE_HOSTNAME=${SITE_HOSTNAME}
            GMAIL_FROM=${GMAIL_FROM}
            GMAIL_TO=${GMAIL_TO}
            GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
            NOTION_API_KEY=${NOTION_API_KEY}
            NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
            SEC_USER_AGENT=${SEC_USER_AGENT:-}
            FMP_API_KEY=${FMP_API_KEY:-}
            FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
            EOF

            docker compose up -d --build

            # Refresh the website with the just-deployed code: regenerate the
            # dashboard and rebuild the index pages. --skip-delivery means NO
            # email/Notion on a push — those still go out only on the weekly
            # cron. Give the container a moment to be ready before exec.
            sleep 3
            # Bound the refresh: a WARM cache (the normal case, since statements
            # are cached ~30d) finishes in minutes, but a COLD cache (first
            # deploy / wiped volume) would re-screen the whole universe for hours
            # and blow the SSH timeout. Cap it; on timeout the previous dashboard
            # is kept and the authoritative full run is the weekly cron.
            if timeout 1800 docker compose exec -T bot warren-bot run --skip-delivery; then
              echo "Website refresh complete"
            else
              echo "Website refresh did not finish within 30m (likely a cold cache); keeping previous dashboard"
            fi
            docker compose exec -T bot /app/deploy/build-index.sh

            docker image prune -f
