name: Run bot now

# On-demand full screen on the VPS. This is the manual path to a fresh, COMPLETE
# dashboard without waiting for the Sunday cron — use it after a deploy, or any
# time you want to refresh the data.
#
# The run is DETACHED inside the container (docker compose exec -d), so a full
# ~5,673-ticker yfinance screen (hours) is NOT bound by the SSH session or any
# GitHub-job timeout — the SSH step just kicks it off and returns. The bot writes
# out/dashboard.html when it finishes; a chained snapshot+index rebuild then
# publishes it. Re-running while one is in flight is refused (lock file) so two
# screens can't fight over the cache.
#
# Progress: tail /var/log/warren-run.log in the container, or just watch the site.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap number of tickers (blank = FULL universe; 30 = quick test)"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # we only KICK OFF the run; it continues after we leave
    steps:
      - name: Kick off detached bot run over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          # Pass the dispatch input through the environment instead of
          # interpolating ${{ }} straight into the script — direct interpolation
          # would let a crafted input inject shell commands on the VPS.
          # `envs: LIMIT` forwards these vars to the remote shell.
          LIMIT: ${{ github.event.inputs.limit }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          envs: LIMIT,VPS_PATH
          script: |
            set -euo pipefail
            cd "$VPS_PATH"
            # Only a bare positive integer is accepted; reject anything else so
            # the value can never carry shell metacharacters into the run below.
            if [ -n "$LIMIT" ] && ! printf '%s' "$LIMIT" | grep -qE '^[0-9]+$'; then
              echo "Invalid limit '$LIMIT' — must be a positive integer." >&2
              exit 1
            fi
            ARGS=""
            if [ -n "$LIMIT" ]; then ARGS="--limit $LIMIT"; fi

            # Refuse to start if a run is already in flight (avoids two screens
            # racing on the shared cache). The lock is cleared when the run ends.
            if docker compose exec -T bot test -f /tmp/warren-run.lock; then
              echo "A bot run is already in progress (lock present). Aborting."
              exit 1
            fi

            # Detached (-d): the screen + snapshot + index rebuild run INSIDE the
            # container and keep going after this SSH session closes. Full output
            # goes to a log in the (persistent) out volume for inspection.
            docker compose exec -T -d bot sh -c '
              touch /tmp/warren-run.lock
              {
                echo "=== run started $(date -u) (args: '"$ARGS"') ==="
                warren-bot run '"$ARGS"'
                cp out/dashboard.html "out/archive/$(date +%Y-%m-%d).html" 2>/dev/null || true
                /app/deploy/build-index.sh
                echo "=== run finished $(date -u) ==="
              } >> out/warren-run.log 2>&1
              rm -f /tmp/warren-run.lock
            '
            echo "Detached full run started. It continues on the VPS after this"
            echo "workflow exits; watch the website or out/warren-run.log for completion."
