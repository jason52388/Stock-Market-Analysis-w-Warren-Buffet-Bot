# NOTE: No `version:` field on purpose. Hostinger's docker-compose parser
# rejects it outright. Modern compose (v2+) ignores it anyway.
#
# NOTE: We use explicit `environment:` blocks with ${VAR} substitution instead
# of `env_file:`. Hostinger's hosted compose parser silently drops env_file
# directives — vars come back empty at runtime with no error.
#
# NOTE: Data dirs use *named volumes*, not bind mounts. Hostinger's Docker UI
# builds in /tmp/... and runs from a different host path that only has the
# compose file, so relative bind mounts (`./out:/app/out`) point at empty/
# non-existent paths and either fail outright or stay empty across rebuilds.
# Named volumes are managed by Docker itself and survive rebuilds reliably.

services:
  bot:
    build: .
    container_name: warren-bot
    restart: unless-stopped
    environment:
      # Schedule
      - TZ=${TZ:-America/New_York}
      # Gmail SMTP
      - GMAIL_FROM=${GMAIL_FROM}
      - GMAIL_TO=${GMAIL_TO}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      # Notion
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      # Secondary data sources (tier-2 enrichment). EDGAR needs no key, just a
      # declared contact; FMP/Finnhub stay inactive until their key is set.
      - SEC_USER_AGENT=${SEC_USER_AGENT}
      - FMP_API_KEY=${FMP_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
    volumes:
      # yfinance SQLite cache survives container rebuilds
      - warren_cache:/app/.cache
      # Generated HTML/CSV — shared read-only with Caddy below
      - warren_out:/app/out
    networks:
      - warren

  caddy:
    build:
      context: .
      dockerfile: deploy/Caddy.Dockerfile
    container_name: warren-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - SITE_HOSTNAME=${SITE_HOSTNAME}
    volumes:
      # Same named volume as the bot — Caddy serves what the bot writes.
      - warren_out:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - warren
    depends_on:
      - bot

networks:
  warren:
    driver: bridge

volumes:
  warren_cache:
  warren_out:
  caddy_data:
  caddy_config:
